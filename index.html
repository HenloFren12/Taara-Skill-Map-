// ═══════════════════════════════════════════════════════════════════
// BUILD HIERARCHY
// ═══════════════════════════════════════════════════════════════════
function buildTree(){
  const root={id:"ROOT",name:"TAARA\nSkill Map",depth:0,desc:"24 Career Domains · 89 Skill Clusters · 330+ Career Paths",children:[]};
  const map={ROOT:root};
  DATA.forEach(n=>{map[n.id]={...n,children:n.depth<3?[]:undefined};});
  DATA.forEach(n=>{const par=map[n.parent];if(par){if(!par.children)par.children=[];par.children.push(map[n.id]);}});
  return root;
}

// ═══════════════════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════════════════
const domains=DATA.filter(n=>n.depth===1).length;
const clusters=DATA.filter(n=>n.depth===2).length;
const skills=DATA.filter(n=>n.depth===3).length;
document.getElementById("stat-line").textContent=
  `${domains} Career Domains · ${clusters} Skill Clusters · ${skills} Specific Career Paths`;

// ═══════════════════════════════════════════════════════════════════
// D3 RADIAL TREE LAYOUT
// ═══════════════════════════════════════════════════════════════════
const W=window.innerWidth, H=window.innerHeight;
const maxR=Math.min(W,H)*0.455;

const svg=d3.select("#graph").attr("viewBox",`0 0 ${W} ${H}`);
const g=svg.append("g");

const zm=d3.zoom().scaleExtent([0.06,6]).on("zoom",e=>g.attr("transform",e.transform));
svg.call(zm);
svg.call(zm.transform,d3.zoomIdentity.translate(W/2,H/2));

const root=d3.hierarchy(buildTree());
const treeLayout=d3.tree()
  .size([2*Math.PI,maxR])
  .separation((a,b)=>(a.parent===b.parent?1:2.2)/Math.max(1,a.depth));
treeLayout(root);

function rx(d){return d.y*Math.cos(d.x-Math.PI/2);}
function ry(d){return d.y*Math.sin(d.x-Math.PI/2);}
const rl=d3.linkRadial().angle(d=>d.x).radius(d=>d.y);

// ── LINKS ──────────────────────────────────────────────────────────
const linkData=root.links();
const LC=["rgba(255,255,255,0.38)","rgba(255,255,255,0.16)","rgba(255,255,255,0.07)"];
const LW=[2,1.2,0.45];
const linkSel=g.append("g").selectAll("path").data(linkData).join("path")
  .attr("class","tree-link")
  .attr("d",d=>rl(d))
  .style("stroke",d=>LC[d.target.depth-1]||"rgba(255,255,255,0.05)")
  .style("stroke-width",d=>LW[d.target.depth-1]||0.4);

// ── NODES ──────────────────────────────────────────────────────────
const allNd=root.descendants();
const RC={0:42,1:19,2:10,3:3.5};
const FC={0:"#ffffff",1:"#c8c8c8",2:"#484848",3:"#1c1c1c"};
const SK={0:"#777",1:"#888",2:"#666",3:"#444"};
const LV=["ROOT","DOMAIN","CLUSTER","SKILL"];

const ndSel=g.append("g").selectAll("g").data(allNd).join("g")
  .attr("transform",d=>`translate(${rx(d)},${ry(d)})`);

ndSel.append("circle")
  .attr("r",d=>RC[d.depth])
  .style("fill",d=>FC[d.depth])
  .style("stroke",d=>SK[d.depth])
  .style("stroke-width","1px")
  .style("cursor","pointer")
  .on("mouseover",showTip)
  .on("mousemove",moveTip)
  .on("mouseout",hideTip)
  .on("click",clickNode);

// ── LABELS ─────────────────────────────────────────────────────────
const FS={0:"11px",1:"8.5px",2:"7.5px",3:"7px"};
const FW={0:"bold",1:"bold",2:"normal",3:"normal"};
const FC2={0:"#111",1:"#ccc",2:"#999",3:"#666"};

ndSel.each(function(d){
  const el=d3.select(this);
  const nm=d.data.name||"";
  const lines=nm.split("\n");
  const r=RC[d.depth];
  const isSkill=d.depth===3;

  // Outward direction from centre to node → use for label offset
  const mag=d.y||1;
  const ux=d.y>0?rx(d)/mag:0;
  const uy=d.y>0?ry(d)/mag:-1;
  const off=r+9;

  if(d.depth===0){
    // Root: two lines centred inside circle
    el.append("text")
      .attr("text-anchor","middle")
      .attr("font-size","9.5px").attr("font-weight","bold").attr("fill","#111")
      .attr("dy",lines.length>1?"-0.2em":"0.35em")
      .text("TAARA");
    if(lines.length>1)
      el.append("text")
        .attr("text-anchor","middle")
        .attr("font-size","7px").attr("font-weight","normal").attr("fill","#333")
        .attr("dy","0.9em").text("Skill Map");
    return;
  }

  const txt=el.append("text")
    .attr("class","nd-label"+(isSkill?" sk-lbl":""))
    .attr("transform",`translate(${(off*ux).toFixed(1)},${(off*uy).toFixed(1)})`)
    .attr("text-anchor","middle")
    .attr("font-size",FS[d.depth])
    .attr("font-weight",FW[d.depth])
    .attr("fill",FC2[d.depth]);

  lines.forEach((ln,i)=>{
    txt.append("tspan").attr("x",0).attr("dy",i===0?"0":"1.15em").text(ln);
  });
});

// ── TOOLTIP ────────────────────────────────────────────────────────
function showTip(e,d){
  const tip=document.getElementById("tip");
  document.getElementById("tLv").textContent=LV[d.depth];
  document.getElementById("tNm").textContent=d.data.name.replace(/\n/g," ");
  const info=d.data.topics?("Topics: "+d.data.topics.join(" · ")):
    (d.data.desc||"");
  document.getElementById("tTp").textContent=info;
  tip.style.display="block";
}
function moveTip(e){
  const tip=document.getElementById("tip");
  tip.style.left=(e.clientX+14)+"px";
  tip.style.top=(e.clientY-10)+"px";
  const r=tip.getBoundingClientRect();
  if(r.right>window.innerWidth-8)tip.style.left=(e.clientX-r.width-14)+"px";
  if(r.bottom>window.innerHeight-8)tip.style.top=(e.clientY-r.height-10)+"px";
}
function hideTip(){document.getElementById("tip").style.display="none";}

// ── CLICK → ZOOM TO SUBTREE ─────────────────────────────────────────
function clickNode(e,d){
  if(d.depth===0){resetView();return;}
  e.stopPropagation();
  const sc=d.depth===1?2.8:d.depth===2?4:5;
  const tx=W/2-rx(d)*sc, ty=H/2-ry(d)*sc;
  svg.transition().duration(650).call(zm.transform,d3.zoomIdentity.translate(tx,ty).scale(sc));
  // Dim non-subtree nodes
  const ancs=new Set(d.descendants().map(n=>n.data.id));
  ndSel.style("opacity",n=>n.depth===0||ancs.has(n.data.id)?1:0.08);
  linkSel.style("opacity",l=>ancs.has(l.target.data.id)?1:0.04);
}
svg.on("click",resetView);
function resetView(){
  svg.transition().duration(550).call(zm.transform,d3.zoomIdentity.translate(W/2,H/2));
  ndSel.style("opacity",null);
  linkSel.style("opacity",null);
}

// ── CONTROLS ────────────────────────────────────────────────────────
let showSkills=false;
document.getElementById("btnLbl").addEventListener("click",function(){
  showSkills=!showSkills;
  d3.selectAll(".sk-lbl").classed("show",showSkills);
  this.textContent=showSkills?"HIDE SKILL LABELS":"SHOW SKILL LABELS";
  this.classList.toggle("on",showSkills);
});
document.getElementById("btnRst").addEventListener("click",resetView);

// ── SEARCH ─────────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input",function(){
  const q=this.value.toLowerCase().trim();
  if(!q){ndSel.style("opacity",null);linkSel.style("opacity",null);return;}
  ndSel.style("opacity",function(d){
    const nm=(d.data.name||"").toLowerCase().replace(/\n/g," ");
    return nm.includes(q)?1:0.06;
  });
  linkSel.style("opacity",0.03);
});
document.getElementById("search").addEventListener("keydown",e=>{
  if(e.key==="Escape"){e.target.value="";ndSel.style("opacity",null);linkSel.style("opacity",null);}
});

function zIn(){svg.transition().duration(220).call(zm.scaleBy,1.45);}
function zOut(){svg.transition().duration(220).call(zm.scaleBy,0.68);}

// ═══════════════════════════════════════════════════════════════════
// AI JSON EXPORT
// ═══════════════════════════════════════════════════════════════════
function buildAIJSON(){
  const domainMap={};
  DATA.filter(n=>n.depth===1).forEach(d=>{
    domainMap[d.id]={
      id:d.id,
      name:d.name.replace(/\n/g," "),
      description:d.desc,
      dropdown_label:d.name.replace(/\n/g," "),
      clusters:{}
    };
  });
  DATA.filter(n=>n.depth===2).forEach(c=>{
    const skills=DATA.filter(s=>s.parent===c.id&&s.depth===3).map(s=>({
      id:s.id,
      name:s.name.replace(/\n/g," "),
      question_count:2,
      question_types:"1 MCQ + 1 practical scenario"
    }));
    domainMap[c.parent].clusters[c.id]={
      id:c.id,
      name:c.name.replace(/\n/g," "),
      question_topics:c.topics||[],
      total_questions:skills.length*2,
      time_minutes:skills.length*2*2,
      skills
    };
  });

  const out={
    system:"TAARA Skill Assessment Engine v2.0",
    total_domains:domains,
    total_clusters:clusters,
    total_career_paths:skills,
    ai_instructions:[
      "STEP 1 — User selects a Domain from the dropdown (use domain.dropdown_label as option text, domain.id as value).",
      "STEP 2 — User selects a Cluster within that domain from a second dropdown.",
      "STEP 3 — Generate questions using cluster.question_topics AND each skill's name as the subject.",
      "STEP 4 — Mix question types per skill: 1 MCQ (knowledge) + 1 practical scenario question.",
      "STEP 5 — Total quiz time = cluster.time_minutes (2 minutes per question).",
      "STEP 6 — Quiz is strictly TIMED. If user does not attempt all questions → set failure:true, block analysis, show 30-min retry timer.",
      "STEP 7 — Score each skill: > 70% = STRENGTH · 40–70% = AVERAGE · < 40% = WEAKNESS.",
      "STEP 8 — For each WEAKNESS: provide 2 improvement tips + 1 free course recommendation + 1 daily exercise.",
      "STEP 9 — Generate final JSON report: { user_id, domain, cluster, strengths:[], averages:[], weaknesses:[], overall_score_percent, recommendations:[], generated_at }",
      "STEP 10 — Respond in the user's selected language (Hindi, Tamil, Bengali, Punjabi, Bhojpuri, English, etc.).",
      "STEP 11 — Include vocal exercise analysis if voice recording was submitted: assess confidence, clarity, fluency, multilingual ability."
    ],
    dropdown_options:Object.values(domainMap).map(d=>({value:d.id,label:d.dropdown_label})),
    skill_map:domainMap
  };
  return JSON.stringify(out,null,2);
}

document.getElementById("btnJson").addEventListener("click",()=>{
  document.getElementById("jbody").textContent=buildAIJSON();
  document.getElementById("jmodal").classList.add("open");
});
document.getElementById("btnClose").addEventListener("click",()=>{
  document.getElementById("jmodal").classList.remove("open");
});
document.getElementById("btnCopy").addEventListener("click",function(){
  navigator.clipboard.writeText(document.getElementById("jbody").textContent).then(()=>{
    this.textContent="✓ COPIED!";
    setTimeout(()=>{this.textContent="COPY ALL";},2500);
  });
});
</script>
